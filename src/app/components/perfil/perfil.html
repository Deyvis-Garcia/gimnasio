<div class="perfil-container">
    
    <div class="header-seccion">
        <div class="titulo-wrapper">
            <span class="material-icons icon-header">manage_accounts</span>
            <div>
                <h2>Perfil</h2>
                <p>Gestiona la información de tu cuenta de administrador.</p>
            </div>
        </div>
    </div>

    <div class="profile-layout">
        
        <div class="profile-card card-avatar">
            <div class="avatar-large">
                <span class="material-icons">person</span>
            </div>
            <div class="avatar-info">
                <h3>Administrador</h3>
                <p class="subtext">Administrador del sistema</p>
                <div class="email-box">
                    <span class="material-icons">email</span>
                    <span>admin@gym.com</span>
                </div>
            </div>
        </div>

        <div class="profile-card card-info">
            <h3>Información de cuenta</h3>
            
            <div class="info-row">
                <span class="info-label">Rol:</span>
                <span class="info-value">Administrador</span>
            </div>
            
            <div class="info-row">
                <span class="info-label">Último acceso:</span>
                <span class="info-value">26/06/2026 22:30</span>
            </div>
            
            <div class="info-row">
                <span class="info-label">Estado:</span>
                <span class="info-value">
                    <span class="status-badge activo">Activo</span>
                </span>
            </div>
        </div>

        <div class="profile-card card-acciones">
            <h3>Acciones</h3>
            <div class="actions-wrapper">
                <button type="button" class="btn-profile logout" routerLink="/">
                    <span class="material-icons">logout</span>
                    Cerrar sesión
                </button>
            </div>
        </div>

    </div>
</div>
