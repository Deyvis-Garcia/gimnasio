<div class="asistencias-container">
    
    <div class="header-seccion">
        <div class="titulo-wrapper">
            <span class="material-icons icon-header">assignment_turned_in</span>
            <div>
                <h2>Asistencia</h2>
                <p>Historial de asistencias</p>
            </div>
        </div>
    </div>
    <div class="content-layout">
        <div class="card-tabla">
            <div class="tabla-header">
                <h3>Historial de asistencia</h3>
                <div class="search-box">
                    <input type="text" placeholder="Buscar...">
                    <button type="button" class="btn-buscar">
                        <span class="material-icons">search</span>
                    </button>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Usuario (Socio)</th>
                            <th>Lunes </th>
                            <th>Martes</th>
                            <th>Miercoles</th>
                            <th>Jueves</th>
                            <th>Viernes</th>
                            <th class="text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let item of listaClases; let i = index">
                            <td>{{item.socio}}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
